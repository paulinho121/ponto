<html class="light" lang="pt-BR"><head>

                    "on-error": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "inverse-surface": "#283044",
                    "on-secondary": "#ffffff",
                    "primary-container": "#2563eb",
                    "surface-bright": "#faf8ff",
                    "secondary": "#006591",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#737686",
                    "secondary-container": "#39b8fd",
                    "tertiary-container": "#007d55",
                    "outline-variant": "#c3c6d7",
                    "on-secondary-fixed-variant": "#004c6e",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#bdffdb",
                    "surface-container-highest": "#dae2fd",
                    "on-surface": "#131b2e",
                    "tertiary-fixed-dim": "#4edea3",
                    "surface-container": "#eaedff",
                    "on-background": "#131b2e",
                    "surface-container-low": "#f2f3ff",
                    "on-error-container": "#93000a",
                    "tertiary": "#006242",

                    "inverse-primary": "#b4c5ff",
                    "on-tertiary": "#ffffff",

                    "surface-tint": "#0053db",
                    "surface-dim": "#d2d9f4",

                    "on-tertiary-fixed-variant": "#005236",
                    "surface-variant": "#dae2fd",
                    "primary-fixed": "#dbe1ff",
                    "tertiary-fixed": "#6ffbbe",
                    "background": "#F8FAFC",
                    "secondary-fixed-dim": "#89ceff",
                    "on-secondary-container": "#004666",
                    "surface": "#faf8ff",
                    "error": "#ba1a1a"
            },
            "borderRadius": {

            "spacing": {

                    "gutter": "16px",
                    "sm": "12px",

                    "md": "16px",

                    "base": "4px",
                    "xl": "32px"
            },

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between items-center bg-background selection:bg-primary/20">
<!-- Subtle Background Shader (Light Mode Accent) -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-40">

</div>
<!-- Top Spacing / Logo Container -->
<header class="w-full pt-16 flex flex-col items-center z-10 fade-in">
<div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4 transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">Chronos</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Laboratório de Pesquisa Avançada</p>
</header>
<!-- Login Form Canvas -->
<main class="w-full max-w-[400px] px-container-margin z-10 fade-in" style="animation-delay: 0.1s;">
<div class="bg-white/80 backdrop-blur-xl border border-outline-variant/30 rounded-[32px] p-8 shadow-xl shadow-slate-200/50">
<div class="space-y-6">
<!-- Matricula Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="matricula">Matrícula</label>
<div class="relative flex items-center group input-focus-ring rounded-2xl transition-all">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-slate-50 border border-slate-200 rounded-2xl font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline-variant" id="matricula" placeholder="Digite sua matrícula" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="senha">Senha</label>
<a class="font-label-sm text-label-sm text-primary hover:underline decoration-primary/30 underline-offset-4" href="#">Esqueci minha senha</a>
</div>
<div class="relative flex items-center group input-focus-ring rounded-2xl transition-all">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-slate-50 border border-slate-200 rounded-2xl font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white transition-all placeholder:text-outline-variant" id="senha" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-white font-title-md text-title-md rounded-2xl shadow-lg shadow-primary/25 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                    Entrar
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Accessibility Note (Hidden but available for Screen Readers) -->
<p class="sr-only">Formulário de acesso restrito aos pesquisadores do laboratório Chronos.</p>
</div>
<!-- Biometric / Guest Prompt (Optional Extra for UI Polish) -->
<div class="mt-8 flex justify-center items-center gap-6 text-on-surface-variant/60">
<button class="flex flex-col items-center gap-2 hover:text-primary transition-colors group">
<div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center group-hover:border-primary transition-colors">
<span class="material-symbols-outlined">fingerprint</span>
</div>
<span class="font-label-sm text-label-sm">Biometria</span>
</button>
<div class="w-px h-8 bg-slate-200"></div>
<button class="flex flex-col items-center gap-2 hover:text-primary transition-colors group">
<div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center group-hover:border-primary transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</div>
<span class="font-label-sm text-label-sm">Suporte</span>
</button>
</div>
</main>
<!-- Footer -->
<footer class="w-full pb-12 flex flex-col items-center gap-4 z-10 fade-in" style="animation-delay: 0.2s;">
<div class="flex items-center gap-3 opacity-40 grayscale">
<div class="h-[1px] w-8 bg-on-surface-variant"></div>
<span class="font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant">Institucional</span>
<div class="h-[1px] w-8 bg-on-surface-variant"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant/50">Versão 1.0.0 • © 2024 Chronos Lab</p>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('senha');
            const toggleIcon = document.getElementById('password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Add a subtle parallax effect to the login card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('main div');
            if (!card) return;
            
            const { clientX, clientY } = e;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const moveX = (clientX - centerX) / 50;
            const moveY = (clientY - centerY) / 50;
            
            card.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // Simple button active state simulation
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('click', () => {
            const icon = submitBtn.querySelector('.material-symbols-outlined');
            icon.textContent = 'sync';
            icon.classList.add('animate-spin');
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.8';
            
            setTimeout(() => {
                icon.textContent = 'check';
                icon.classList.remove('animate-spin');
                submitBtn.classList.replace('bg-primary', 'bg-tertiary-container');
                submitBtn.innerHTML = 'Sucesso <span class="material-symbols-outlined">check</span>';
            }, 1200);
        });
    </script>
</body></html>
