<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Chronos — Administração de Locais</title>
  <meta name="description" content="Cadastro dos locais autorizados para bater o ponto no Chronos."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="chronos.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .glass { background:rgba(255,255,255,0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .slide-up { animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .animate-spin { animation: spin 0.8s linear infinite; }
    .nav-active::after { content:''; display:block; width:4px; height:4px; background:currentColor; border-radius:50%; margin: 3px auto 0; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">

<!-- Top App Bar -->
<header class="fixed top-0 left-0 right-0 z-50 glass border-b border-outline-variant/30 flex justify-between items-center h-16 px-container-margin">
  <div class="flex items-center gap-sm">
    <div class="w-8 h-8 bg-primary rounded-xl flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings:'FILL' 1">admin_panel_settings</span>
    </div>
    <h1 class="text-headline-lg-mobile font-bold text-on-surface">Administração</h1>
  </div>
  <a href="ponto.html" class="text-label-sm text-primary hover:underline underline-offset-4 font-semibold flex items-center gap-1">
    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
    Voltar
  </a>
</header>

<main class="pt-24 px-container-margin max-w-2xl mx-auto space-y-lg">

  <!-- Novo local -->
  <section class="p-lg bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm space-y-md slide-up">
    <h2 class="text-title-md font-semibold text-on-surface flex items-center gap-xs">
      <span class="material-symbols-outlined text-primary">add_location_alt</span>
      Novo Local Autorizado
    </h2>

    <div class="space-y-xs">
      <label class="text-label-sm text-on-surface-variant ml-1 block" for="loc-nome">Nome do local</label>
      <input id="loc-nome" class="w-full h-12 px-md bg-surface-container-low border border-outline-variant/50 rounded-2xl text-body-md focus:outline-none focus:border-primary transition-all" placeholder="Ex: Laboratório de Pesquisa Avançada" type="text"/>
    </div>

    <div class="grid grid-cols-2 gap-md">
      <div class="space-y-xs">
        <label class="text-label-sm text-on-surface-variant ml-1 block" for="loc-lat">Latitude</label>
        <input id="loc-lat" class="w-full h-12 px-md bg-surface-container-low border border-outline-variant/50 rounded-2xl text-body-md focus:outline-none focus:border-primary transition-all" placeholder="-23.55052" type="number" step="any"/>
      </div>
      <div class="space-y-xs">
        <label class="text-label-sm text-on-surface-variant ml-1 block" for="loc-lng">Longitude</label>
        <input id="loc-lng" class="w-full h-12 px-md bg-surface-container-low border border-outline-variant/50 rounded-2xl text-body-md focus:outline-none focus:border-primary transition-all" placeholder="-46.63331" type="number" step="any"/>
      </div>
    </div>

    <button id="btn-use-gps" type="button" class="w-full h-12 border border-primary/30 text-primary rounded-2xl font-semibold flex items-center justify-center gap-sm hover:bg-primary/5 transition-colors">
      <span class="material-symbols-outlined" id="gps-icon">my_location</span>
      <span id="gps-label">Usar minha localização atual</span>
    </button>
    <p id="gps-accuracy" class="text-label-sm text-on-surface-variant text-center"></p>

    <div class="space-y-xs">
      <label class="text-label-sm text-on-surface-variant ml-1 block" for="loc-raio">Raio de tolerância: <span id="loc-raio-display" class="text-primary font-bold">100m</span></label>
      <input id="loc-raio" class="w-full accent-primary" type="range" min="20" max="1000" step="10" value="100"/>
    </div>

    <div id="loc-error" class="hidden p-sm rounded-2xl bg-error-container/30 border border-error/20 flex items-center gap-sm">
      <span class="material-symbols-outlined text-error text-[18px]" style="font-variation-settings:'FILL' 1">error</span>
      <span class="text-body-md text-error" id="loc-error-msg">Verifique os campos.</span>
    </div>

    <button id="btn-save-location" type="button" class="w-full h-14 bg-primary text-on-primary text-title-md font-semibold rounded-2xl shadow-lg shadow-primary/25 hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
      <span class="material-symbols-outlined" id="save-loc-icon">save</span>
      Salvar Local
    </button>
  </section>

  <!-- Lista de locais -->
  <section class="space-y-md slide-up" style="animation-delay:.05s">
    <h2 class="text-title-md font-semibold text-on-surface">Locais Cadastrados</h2>
    <div id="locations-list" class="space-y-sm"></div>
    <div id="locations-empty" class="hidden text-center py-xl">
      <span class="material-symbols-outlined text-[48px] text-outline-variant" style="font-variation-settings:'FILL' 1">location_off</span>
      <p class="text-body-md text-on-surface-variant mt-2">Nenhum local cadastrado ainda.</p>
    </div>
  </section>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 glass border-t border-outline-variant/20 shadow-lg flex justify-around items-center h-20 px-container-margin">
  <a href="ponto.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">timer</span>
    <span class="text-label-sm">Ponto</span>
  </a>
  <a href="historico.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">history</span>
    <span class="text-label-sm">Histórico</span>
  </a>
  <a href="perfil.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">person</span>
    <span class="text-label-sm">Perfil</span>
  </a>
</nav>

<script>
(async () => {
  // ── Auth guard: exige login + is_admin ────────────────────────────────────
  if (!(await ChronosNav.requireAuth())) return;
  const user = ChronosState.getUser();
  if (!user?.isAdmin) {
    ChronosUI.showToast('Acesso restrito a super administradores.', 'error');
    setTimeout(() => { window.location.href = 'ponto.html'; }, 1200);
    return;
  }

  let capturedPosition = null;

  // ── Slider de raio ─────────────────────────────────────────────────────────
  document.getElementById('loc-raio').addEventListener('input', e => {
    document.getElementById('loc-raio-display').textContent = `${e.target.value}m`;
  });

  // ── Capturar GPS ──────────────────────────────────────────────────────────
  document.getElementById('btn-use-gps').addEventListener('click', async () => {
    const icon  = document.getElementById('gps-icon');
    const lbl   = document.getElementById('gps-label');
    const accEl = document.getElementById('gps-accuracy');

    icon.classList.add('animate-spin');
    icon.textContent = 'sync';
    lbl.textContent = 'Obtendo localização...';
    accEl.textContent = '';

    try {
      const pos = await ChronosUI.getCurrentPosition();
      capturedPosition = pos;
      document.getElementById('loc-lat').value = pos.latitude.toFixed(6);
      document.getElementById('loc-lng').value = pos.longitude.toFixed(6);
      accEl.textContent = `Precisão aproximada: ${Math.round(pos.accuracy)}m`;
      ChronosUI.showToast('Localização capturada com sucesso!', 'success');
    } catch (err) {
      ChronosUI.showToast(err.message || 'Não foi possível obter a localização.', 'error');
    } finally {
      icon.classList.remove('animate-spin');
      icon.textContent = 'my_location';
      lbl.textContent = 'Usar minha localização atual';
    }
  });

  // ── Salvar novo local ─────────────────────────────────────────────────────
  document.getElementById('btn-save-location').addEventListener('click', async () => {
    const errorBox = document.getElementById('loc-error');
    const errorMsg = document.getElementById('loc-error-msg');
    const btn      = document.getElementById('btn-save-location');
    const icon     = document.getElementById('save-loc-icon');

    const nome      = document.getElementById('loc-nome').value.trim();
    const latitude  = parseFloat(document.getElementById('loc-lat').value);
    const longitude = parseFloat(document.getElementById('loc-lng').value);
    const raioMetros = parseInt(document.getElementById('loc-raio').value, 10);

    if (!nome || isNaN(latitude) || isNaN(longitude)) {
      errorMsg.textContent = 'Preencha o nome e as coordenadas (use o GPS ou digite manualmente).';
      errorBox.classList.remove('hidden');
      return;
    }
    errorBox.classList.add('hidden');

    btn.disabled = true;
    icon.textContent = 'sync';
    icon.classList.add('animate-spin');

    try {
      await ChronosState.createLocation({ nome, latitude, longitude, raioMetros });
      ChronosUI.showToast('Local cadastrado com sucesso!', 'success');
      document.getElementById('loc-nome').value = '';
      document.getElementById('loc-lat').value = '';
      document.getElementById('loc-lng').value = '';
      document.getElementById('loc-raio').value = 100;
      document.getElementById('loc-raio-display').textContent = '100m';
      document.getElementById('gps-accuracy').textContent = '';
      capturedPosition = null;
      await renderLocations();
    } catch (err) {
      errorMsg.textContent = err.message || 'Não foi possível salvar o local.';
      errorBox.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      icon.classList.remove('animate-spin');
      icon.textContent = 'save';
    }
  });

  // ── Listar locais ─────────────────────────────────────────────────────────
  async function renderLocations() {
    const list  = document.getElementById('locations-list');
    const empty = document.getElementById('locations-empty');
    list.innerHTML = '';

    let locais = [];
    try {
      locais = await ChronosState.listLocations();
    } catch (err) {
      ChronosUI.showToast('Erro ao carregar locais: ' + (err.message || ''), 'error');
    }

    if (locais.length === 0) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    locais.forEach(loc => {
      const card = document.createElement('div');
      card.className = 'p-md bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-sm flex items-center justify-between gap-md';
      card.innerHTML = `
        <div class="min-w-0">
          <p class="font-semibold text-on-surface truncate">${loc.nome}</p>
          <p class="text-label-sm text-on-surface-variant">
            ${loc.latitude.toFixed(5)}, ${loc.longitude.toFixed(5)} • raio ${loc.raio_metros}m
          </p>
          <span class="inline-block mt-1 px-sm py-0.5 rounded-full text-label-xs font-semibold ${loc.ativo ? 'bg-tertiary/10 text-tertiary' : 'bg-outline-variant/20 text-on-surface-variant'}">
            ${loc.ativo ? 'Ativo' : 'Inativo'}
          </span>
        </div>
        <div class="flex items-center gap-xs flex-shrink-0">
          <button class="btn-toggle w-9 h-9 rounded-full flex items-center justify-center hover:bg-surface-container-low transition-colors" title="${loc.ativo ? 'Desativar' : 'Ativar'}" data-id="${loc.id}" data-ativo="${loc.ativo}">
            <span class="material-symbols-outlined text-on-surface-variant">${loc.ativo ? 'toggle_on' : 'toggle_off'}</span>
          </button>
          <button class="btn-delete w-9 h-9 rounded-full flex items-center justify-center hover:bg-error/10 transition-colors" title="Excluir" data-id="${loc.id}">
            <span class="material-symbols-outlined text-error">delete</span>
          </button>
        </div>
      `;
      list.appendChild(card);
    });

    list.querySelectorAll('.btn-toggle').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const novoEstado = btn.dataset.ativo !== 'true';
        try {
          await ChronosState.setLocationActive(id, novoEstado);
          await renderLocations();
        } catch (err) {
          ChronosUI.showToast('Erro ao atualizar local: ' + (err.message || ''), 'error');
        }
      });
    });

    list.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Excluir este local permanentemente?')) return;
        try {
          await ChronosState.deleteLocation(btn.dataset.id);
          await renderLocations();
          ChronosUI.showToast('Local excluído.', 'info');
        } catch (err) {
          ChronosUI.showToast('Erro ao excluir local: ' + (err.message || ''), 'error');
        }
      });
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  await renderLocations();
  ChronosUI.setupMicroInteractions();
})();
</script>
</body>
</html>
